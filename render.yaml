services:
  - type: web
    name: math-arena-server
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:server
    startCommand: node packages/server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: math-arena-client
    runtime: static
    plan: free
    buildCommand: npm install --include=dev && npm run build:client
    staticPublishPath: packages/client/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    envVars:
      - key: VITE_SERVER_URL
        sync: false
